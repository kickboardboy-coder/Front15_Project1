<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube 구현</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="youtube-style.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="hd-sec1">
            <!-- 헤더 - 햄버거 버튼 -->
            <input type="checkbox" id="hamburger-toggle" class="hamburger-input">
            <label for="hamburger-toggle" class="hamburger">
                <img src="./img/youtube-index/header/hamburger.svg" alt="메뉴">
            </label>
            <!-- 유튜브 로고 -->
            <div class="main-logo">
                <img src="./img/youtube-index/header/main-logo.png">
            </div>
        </div>
        <div class="hd-sec2">
            <!-- 헤더 - 검색 바-->
            <div class="searchbar">
                <input type="text" placeholder="Search">
                <button type="search-submit" aria-label="검색실행">
                    <img src="./img/youtube-index/header/search.svg">
                </button>
                <!-- 헤더 - 검색 바 - 버튼 마이크 사용 검색 -->
                <button class="mic-btn">
                    <img src="./img/youtube-index/header/mic.svg">
                </button>
            </div>
        </div>
        <div class="hd-sec3">
            <!-- 헤더 - 네비 -->
            <nav class="menu">
            <!-- 헤더 - 네비 - Create 버튼 - Google Apps 버튼(지메일, 드라이브, 지도 등) - 알림 버튼 -->
                <ul class="h-nav">
                    <li class="Create-btn">
                        <img src="./img/youtube-index/header/create.svg">
                    </li>
                    <li class="apps-btn">
                        <img src="./img/youtube-index/header/apps.svg">
                    </li>
                    <li class="notification-btn">
                        <img src="./img/youtube-index/header/notifications.svg">
                    </li>
                </ul>
            </nav>
        </div>
        
        
    </header>

    <!-- 사이드바 -->
    <aside class="sidebar">
        <!-- 사이드바 Home -->
        <!-- 사이드바 Explore -->
        <!-- 사이드바 Subscriptions -->

                </span>
