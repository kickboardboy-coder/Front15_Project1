<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube 구현</title>
    <link rel="stylesheet" href="youtube-style.css">
</head>
<body>
    <!-- 헤더 -->
    <header>
        <!-- 헤더 - 햄버거 버튼 -->
        <button class="hamburger" onclick="toggle()">
            <span></span><span></span><span></span>
        </button>
        <!-- 유튜브 로고 -->
        <div class="main-logo">
            <img src="./img/youtube-index/header/main-logo.png">
        </div>
        <!-- 헤더 - 검색 바-->
        <div class="searchbar">
            <input class="search" placeholder="Search">
            <button type="search-submit" aria-label="검색실행">
                <img src="#">
            </button>
            <!-- 헤더 - 검색 바 - 버튼 마이크 사용 검색 -->
            <button class="mic-btn">
                <img src="#">
            </button>
        </div>
        
        <!-- 헤더 - 네비 -->
        <nav class="navigation">
        <!-- 헤더 - 네비 - Create 버튼 - Google Apps 버튼(지메일, 드라이브, 지도 등) - 알림 버튼 -->
            <button class="Create-btn">
                <img src="#">
            </button>
            <button class="apps-btn">
                <img src="#">
            </button>
            <button class="notification-btn">
                <img src="#">
            </button>
        </nav>
    </header>
    
</body>
</html>
